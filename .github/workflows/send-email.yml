name: EGK Send Email
on:
  repository_dispatch:
    types: [cert-email]

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send email via Resend
        uses: actions/github-script@v7
        with:
          script: |
            const { to, subject, html } = context.payload.client_payload;
            const toArr = Array.isArray(to) ? to : [to];
            const res = await fetch('https://api.resend.com/emails', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ${{ secrets.RESEND_API_KEY }}',
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                from: 'EduGolfKids <noreply@edugolfkids.com>',
                to: toArr,
                subject,
                html,
              }),
            });
            if (res.ok) {
              core.info(`Email sent: ${subject} → ${toArr.join(', ')}`);
            } else {
              const err = await res.json();
              core.warning(`Resend failed: ${JSON.stringify(err)}`);
            }
